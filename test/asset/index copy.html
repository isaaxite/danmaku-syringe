<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    video {
      width: 100%;
      height: 100%;
    }

    #video-container {
      position: relative;
      background-color: blue;
      width: 600px;
      height: 800px;
    }

    #danmaku {
      position: absolute;
      top: 10px; /* Adjust as needed */
      left: 10px; /* Adjust as needed */
      z-index: 9999; /* Ensure danmaku is on top of video */
      padding: 10px;
    }

    #danmaku p {
      color: red;
    }

    .selected {
      border: 2px solid red;
      box-shadow: 0 0 5px red;
    }

    .show {
      display: block;
    }

    .hide {
      display: none;
    }

    #confirm-inject-danmaku-ext {
      position: absolute;
      z-index: 10;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" controls src="./bxuVPiq7g9lTaA.mp4"></video>
    <div id="danmaku">
      <p>Danmaku text goes here</p>
    </div>
    <!-- <button id="toggle-fullscreen">Full</button> -->
  </div>
</body>
<script>
  

  function main() {
    const video = document.getElementById('video');

    video.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    video.addEventListener('mozfullscreenchange', handleFullscreenChange);
    video.addEventListener('fullscreenchange', handleFullscreenChange);

    function handleFullscreenChange() {
      console.info(1);
      const danmaku = document.getElementById('danmaku');
      if (document.fullscreenElement || document.mozFullScreenElement || document.webkitFullscreenElement) {
        console.info(2);
        danmaku.style.display = 'block';
      } else {
        console.info(3);
        // danmaku.style.display = 'none';
      }
      console.info(4);
    }


    const fullScreenElement = document.querySelector("#video-container");
    const fsButton = document.getElementById("toggle-fullscreen");

    fsButton.addEventListener("click", () => {
      if (document.fullscreenElement) {
        // exitFullscreen 方法只能在 Document 对象上使用。
        document.exitFullscreen();
      } else {
        fullScreenElement.requestFullscreen();
      }
    });


    function onceIntoVideoElementArea(element) {
      console.info('onceIntoVideoElementArea invoke', element, Math.random())
      element.classList.add('selected');

      const videoParentEle = element.parentElement;
      const confirmHtmlContainerId = 'confirm-inject-danmaku-ext';
      let confirmHtmlContainer = document.getElementById(confirmHtmlContainerId);

      if (!confirmHtmlContainer) {
        const confirmHtml = `<p>点击注入弹幕扩展</p>`
        confirmHtmlContainer = document.createElement('div');
        confirmHtmlContainer.setAttribute('id', confirmHtmlContainerId);
        confirmHtmlContainer.innerHTML = confirmHtml;
        confirmHtmlContainer.addEventListener('click', function() {
          console.info(444);
        });

        videoParentEle.appendChild(confirmHtmlContainer);
      } else {
        confirmHtmlContainer.classList.remove('hide');
      }
    }

    const videoInfosArr = [];
    function findVideoEles() {
      videoInfosArr.length = 0;
      const videoEles =document.getElementsByTagName('VIDEO');
      for (let i = 0; i < videoEles.length; i++) {
        const element = videoEles[i];
        const rect = element.getBoundingClientRect();
        videoInfosArr.push({
          element,
          startX: rect.x,
          startY: rect.y,
          endX: rect.right,
          endY: rect.bottom,
        });
      }
    }

    findVideoEles();

    let whenIn = false;
    let whenOut = true;
    let currentVideoInfo = null;

    function mousemoveEventHandler(event) {
      if (videoInfosArr.length === 0) {
        return false;
      }

      if (!currentVideoInfo) {
        for (let i = 0; i < videoInfosArr.length; i++) {
          const current = videoInfosArr[i];

          if (
            current.startX < event.clientX &&
            current.endX > event.clientX &&
            current.startY < event.clientY &&
            current.endY > event.clientY
          ) {
            currentVideoInfo = current;
            break;
          }
        }
      }

      if (!currentVideoInfo) {
        return false;
      }

      if (
        currentVideoInfo.startX < event.clientX &&
        currentVideoInfo.endX > event.clientX &&
        currentVideoInfo.startY < event.clientY &&
        currentVideoInfo.endY > event.clientY
      ) {
        if (!whenIn) {
          onceIntoVideoElementArea(currentVideoInfo.element);
        }
        whenIn = true;
        whenOut = false;
      } else {
        if (!whenOut) {
          console.info(2)
          currentVideoInfo.element.classList.remove('selected');
          const confirmHtmlContainerId = 'confirm-inject-danmaku-ext';
          const confirmHtmlContainer = document.getElementById(confirmHtmlContainerId);
          confirmHtmlContainer.classList.add('hide')
        }

        whenIn = false;
        whenOut = true;
        currentVideoInfo = null;
      }
    }
    document.addEventListener('mousemove', mousemoveEventHandler);
  }

  window.addEventListener('load', function() {
    console.log('所有资源加载完成！');
    main();
  });
</script>
</html>
