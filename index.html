<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danmaku Migrate</title>
  <style>
    video {
      width: 100%;
      height: 100%;
      position: absolute;
      top: left;
      left: 0;
    }

    #video-container {
      position: relative;
      background-color: blue;
      width: 1080px;
      height: 720px;
    }

    #danmaku {
      position: absolute;
      top: 10px; /* Adjust as needed */
      left: 10px; /* Adjust as needed */
      z-index: 9999; /* Ensure danmaku is on top of video */
      padding: 10px;
    }

    #danmaku p {
      color: red;
    }

    .selected {
      border: 2px solid red;
      box-shadow: 0 0 5px red;
    }

    .show {
      display: block;
    }

    .hide {
      display: none;
    }

    #confirm-inject-danmaku-ext {
      position: absolute;
      z-index: 10;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
    }

    #danmaku-container {
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 50px;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <!-- <video id="video" controls src="./bxuVPiq7g9lTaA.mp4"></video> -->
    <video id="video" controls muted="true" controlslist="nofullscreen" src="./test/asset/movie_300.mp4"></video>
    <div id="danmaku-container"></div>
  </div>
  <div id="root"></div>
</body>
<script src="./dist/index.js"></script>
<script>
  new EventSource('/esbuild').addEventListener('change', () => location.reload())
</script>
</html>
